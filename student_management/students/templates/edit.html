<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">
    {% csrf_token %}

    Name:
    <input type="text" name="name" value="{{ student.name }}"><br><br>

    Roll No:
    <input type="text" name="roll_no" value="{{ student.roll_no }}"><br><br>

    Course:
    <input type="text" name="course" value="{{ student.course }}"><br><br>

    Email:
    <input type="email" name="email" value="{{ student.email }}"><br><br>

    Phone:
    <input type="text" name="phone" value="{{ student.phone }}"><br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
