<!DOCTYPE html>
<html>

<head>

    <title>Student Management System</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightblue;
        }

    </style>

</head>

<body>

<h1>Student Management System</h1>

<table>

<tr>
    <th>Name</th>
    <th>Roll No</th>
    <th>Course</th>
    <th>Email</th>
    <th>Phone</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.roll_no }}</td>
    <td>{{ student.course }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.phone }}</td>
</tr>

{% endfor %}

</table>

</body>
