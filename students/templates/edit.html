<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            color: #333;
        }

        label{
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Edit Student</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" value="{{ student.name }}" required>

        <label>Roll No</label>
        <input type="text" name="roll_no" value="{{ student.roll_no }}" required>

        <label>Course</label>
        <input type="text" name="course" value="{{ student.course }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ student.email }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ student.phone }}" required>

        <button type="submit">Update Student</button>

    </form>

</div>

</body>
</html>
