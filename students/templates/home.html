<!DOCTYPE html>
<html>

<head>
    <title>Student Management System</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightblue;
        }

        a{
            text-decoration: none;
        }

    </style>

</head>

<body>

    <div style="text-align:right; margin:20px;">
    <a href="{% url 'logout' %}"
       style="background:red; color:white; padding:10px 15px; text-decoration:none; border-radius:5px;">
       Logout
    </a>
</div>

<h1>Student Management System</h1>

<table>

    <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Course</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    {% for student in students %}

    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.roll_no }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.phone }}</td>

        <td>
            <<a href="/edit/{{ student.id }}/">
                Edit
            </a>
        </td>

        <td>
            <a href="/delete/{{ student.id }}/">
                Delete
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

</body>

</html>
